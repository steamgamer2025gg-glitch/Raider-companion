
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARC Companion</title>
<style>
body{font-family:Arial;background:#111;color:#fff;max-width:800px;margin:auto;padding:16px}
h1{color:#f90}input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
input,select{background:#222;color:#fff}button{background:#f90;color:#000;font-weight:bold;cursor:pointer}
.tabs{display:flex;gap:6px}.tabs button{flex:1;background:#333;color:#fff}
.card{background:#1b1b1b;padding:10px;border-radius:8px;margin:8px 0}
.row{display:flex;gap:6px}.row button{flex:1;background:#444;color:#fff}
.stats{background:#222;padding:8px;border-radius:8px;margin:8px 0}
small{color:#aaa}
</style></head><body>
<h1>ARC Companion</h1>
<div id="stats" class="stats"></div>
<div class="tabs">
<button onclick="setTab('all')">All</button>
<button onclick="setTab('favorites')">⭐</button>
<button onclick="setTab('priority')">📌</button>
</div>
<input id="itemName" placeholder="Item name">
<input id="itemCat" placeholder="Category">
<input id="itemLoc" placeholder="Location / Map">
<button id="addBtn">Add Item</button>
<input id="search" placeholder="Search">
<div id="list"></div>
<script>
let tab='all';
let items=JSON.parse(localStorage.getItem('arc_items')||'[]');
const $=id=>document.getElementById(id);
function save(){localStorage.setItem('arc_items',JSON.stringify(items))}
function setTab(t){tab=t;render();}
$('addBtn').addEventListener('click',()=>{
 const n=$('itemName').value.trim();
 if(!n){alert('Enter an item name');return;}
 items.push({id:Date.now(),name:n,cat:$('itemCat').value.trim(),loc:$('itemLoc').value.trim(),fav:false,priority:false,color:'gray'});
 $('itemName').value='';$('itemCat').value='';$('itemLoc').value='';
 save();render();
});
$('search').addEventListener('input',render);
function toggle(id,key){items.forEach(i=>{if(i.id===id)i[key]=!i[key]});save();render();}
function setColor(id,v){items.forEach(i=>{if(i.id===id)i.color=v});save();render();}
function del(id){items=items.filter(i=>i.id!==id);save();render();}
function render(){
 let q=$('search').value.toLowerCase();
 let arr=items.filter(i=>{
  if(tab==='favorites'&&!i.fav)return false;
  if(tab==='priority'&&!i.priority)return false;
  return (i.name+' '+i.cat+' '+i.loc).toLowerCase().includes(q);
 }).sort((a,b)=>(b.priority-a.priority));
 $('stats').textContent=`Items: ${items.length} | ⭐ ${items.filter(i=>i.fav).length} | 📌 ${items.filter(i=>i.priority).length} | Categories: ${new Set(items.map(i=>i.cat).filter(Boolean)).size}`;
 let out='';
 arr.forEach(i=>{
 out+=`<div class="card" style="border-left:6px solid ${i.color}">
 <b>${i.name}</b> ${i.fav?'⭐':''}<br><small>${i.cat||'No Category'} • ${i.loc||'No Location'}</small><br>
 <select onchange="setColor(${i.id},this.value)">
 ${['gray','green','blue','orange','red'].map(c=>`<option value="${c}" ${i.color===c?'selected':''}>${c}</option>`).join('')}
 </select>
 <div class="row">
 <button onclick="toggle(${i.id},'fav')">⭐</button>
 <button onclick="toggle(${i.id},'priority')">📌</button>
 <button onclick="del(${i.id})">Delete</button>
 </div></div>`;
 });
 $('list').innerHTML=out;
}
render();
</script></body></html>
